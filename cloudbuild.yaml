steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/carbon-canvas', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/carbon-canvas']
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'carbon-canvas'
      - '--image=gcr.io/$PROJECT_ID/carbon-canvas'
      - '--region=asia-south1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=256Mi'
      - '--min-instances=0'
      - '--max-instances=1'
      - '--timeout=5m'
      - '--set-env-vars=OPENROUTER_API_KEY=${_OPENROUTER_API_KEY}'
substitutions:
  _OPENROUTER_API_KEY: 'set-via-api-or-console'
images:
  - 'gcr.io/$PROJECT_ID/carbon-canvas'
